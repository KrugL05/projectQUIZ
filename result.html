<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Результат</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/result.css">
</head>
<body>

<header class="header">
    <div class="container">
        <div class="logo">
            <img src="images/Logo.png" alt="Логотип">
        </div>

</header>

<section class="result">
    <div class="container">
        <div class="question-image">
            <img src="images/question-marks.png" alt="Знаки вопросов">

        <div class="result-title big-title">Ура! Ты прошёл тест! <span>Твой результат:</span></div>

        <div class="result-view">
            <a href="view.html" id="result-view">Посмотреть правильные ответы</a>
            <img src="images/test-arrow.png" alt="Стрелочка">

    </div>
</section>

<footer class="footer">
    «АйтилогияQuiz» © Все права защищены / 2022
</footer>

<script src="scripts/common.js"></script>

</html>
